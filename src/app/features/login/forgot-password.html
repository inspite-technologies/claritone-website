<div class="min-h-[80vh] flex items-center justify-center bg-slate-50 dark:bg-slate-900 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white dark:bg-slate-800 rounded-2xl shadow-xl overflow-hidden">
        <div class="px-8 py-10">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-slate-900 dark:text-white">Forgot Password</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-2">Enter your email and we'll send you a reset link</p>
            </div>

            <!-- Phase 1: Enter Email -->
            <form *ngIf="!isSent" (ngSubmit)="onSubmitEmail()" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                        Email Address
                    </label>
                    <input type="email" id="email" name="email" [(ngModel)]="email" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="you@example.com" />
                </div>

                <button type="submit" [disabled]="isLoading"
                    class="w-full bg-primary text-white py-3.5 rounded-xl font-bold hover:bg-[#c4161b] hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-primary/30 flex items-center justify-center disabled:opacity-70 disabled:pointer-events-none">
                    <span *ngIf="!isLoading">Send Reset OTP</span>
                    <span *ngIf="isLoading" class="flex items-center gap-2">
                        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Sending...
                    </span>
                </button>
            </form>

            <!-- Phase 2: Enter OTP and New Password -->
            <form *ngIf="isSent" (ngSubmit)="onResetPassword()" class="space-y-6">
                <div
                    class="text-center p-4 bg-slate-50 dark:bg-slate-900 rounded-xl mb-4 text-sm text-slate-600 dark:text-slate-400">
                    OTP has been sent to <b>{{email}}</b>
                </div>

                <div>
                    <label for="otp" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                        Enter OTP Code
                    </label>
                    <input type="text" id="otp" name="otp" [(ngModel)]="otp" required maxlength="6"
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-center text-2xl tracking-[1em] font-bold"
                        placeholder="000000" />
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                        New Password
                    </label>
                    <input type="password" id="password" name="password" [(ngModel)]="password" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="••••••••" />
                </div>

                <div>
                    <label for="confirmPassword"
                        class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                        Confirm Password
                    </label>
                    <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword"
                        required
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="••••••••" />
                </div>

                <button type="submit" [disabled]="isLoading"
                    class="w-full bg-primary text-white py-3.5 rounded-xl font-bold hover:bg-[#c4161b] hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-primary/30 flex items-center justify-center disabled:opacity-70 disabled:pointer-events-none">
                    <span *ngIf="!isLoading">Reset Password</span>
                    <span *ngIf="isLoading" class="flex items-center gap-2">
                        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Resetting...
                    </span>
                </button>

                <div class="text-center">
                    <button type="button" (click)="isSent = false"
                        class="text-primary hover:underline text-sm font-medium">
                        Change Email
                    </button>
                </div>
            </form>

            <div *ngIf="!isSent" class="mt-6 text-center text-sm">
                <a routerLink="/login" class="text-primary font-semibold hover:underline">Back to Login</a>
            </div>
        </div>
    </div>
</div>

<div class="min-h-[80vh] flex items-center justify-center bg-slate-50 dark:bg-slate-900 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white dark:bg-slate-800 rounded-2xl shadow-xl overflow-hidden">
        <div class="px-8 py-10">
            <div class="text-center mb-8">
                <h2 *ngIf="isLoginMode && !isOtpMode" class="text-3xl font-bold text-slate-900 dark:text-white">Welcome
                    Back</h2>
                <h2 *ngIf="!isLoginMode && !isOtpMode" class="text-3xl font-bold text-slate-900 dark:text-white">Create
                    Account</h2>
                <h2 *ngIf="isOtpMode" class="text-3xl font-bold text-slate-900 dark:text-white">Verify OTP</h2>

                <p *ngIf="isLoginMode && !isOtpMode" class="text-slate-500 dark:text-slate-400 mt-2">Sign in to your
                    account</p>
                <p *ngIf="!isLoginMode && !isOtpMode" class="text-slate-500 dark:text-slate-400 mt-2">Join us today</p>
                <p *ngIf="isOtpMode" class="text-slate-500 dark:text-slate-400 mt-2">Please enter the security code</p>
            </div>
            <form *ngIf="!isOtpMode" (ngSubmit)="onSubmit()" class="space-y-6">
                <div *ngIf="!isLoginMode">
                    <label for="fullName" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                        Full Name
                    </label>
                    <input type="text" id="fullName" name="fullName" [(ngModel)]="loginForm.fullName"
                        [required]="!isLoginMode"
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="John Doe" />
                </div>

                <div *ngIf="!isLoginMode">
                    <label for="phone" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                        Phone Number
                    </label>
                    <input type="tel" id="phone" name="phone" [(ngModel)]="loginForm.phone" [required]="!isLoginMode"
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="+1 234 567 890" />
                </div>

                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                        Email Address
                    </label>
                    <input type="email" id="email" name="email" [(ngModel)]="loginForm.email" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="you@example.com" />
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="password" class="block text-sm font-semibold text-slate-700 dark:text-slate-300">
                            Password
                        </label>
                        <a *ngIf="isLoginMode && !isOtpMode" routerLink="/forgot-password"
                            class="text-sm font-semibold text-primary hover:text-[#c4161b] transition-colors">
                            Forgot password?
                        </a>
                    </div>
                    <input type="password" id="password" name="password" [(ngModel)]="loginForm.password" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="••••••••" />
                </div>

                <button type="submit" [disabled]="isLoading"
                    class="w-full bg-primary text-white py-3.5 rounded-xl font-bold hover:bg-[#c4161b] hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-primary/30 flex items-center justify-center disabled:opacity-70 disabled:pointer-events-none">
                    <span *ngIf="!isLoading">{{ isLoginMode ? 'Sign In' : 'Sign Up' }}</span>
                    <span *ngIf="isLoading" class="flex items-center gap-2">
                        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        {{ isLoginMode ? 'Signing In...' : 'Signing Up...' }}
                    </span>
                </button>
            </form>

            <!-- OTP Verification Form -->
            <div *ngIf="isOtpMode" class="space-y-6">
                <div class="text-center">
                    <p class="text-slate-600 dark:text-slate-400">An OTP has been sent to <b>{{loginForm.email}}</b></p>
                </div>

                <div>
                    <label for="otp" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                        Enter OTP
                    </label>
                    <input type="text" id="otp" name="otp" [(ngModel)]="loginForm.otp" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-center text-2xl tracking-[1em] font-bold"
                        placeholder="000000" maxlength="6" />
                </div>

                <button type="button" (click)="verifyOtp()" [disabled]="isLoading"
                    class="w-full bg-primary text-white py-3.5 rounded-xl font-bold hover:bg-[#c4161b] hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-primary/30 flex items-center justify-center disabled:opacity-70 disabled:pointer-events-none">
                    <span *ngIf="!isLoading">Verify OTP</span>
                    <span *ngIf="isLoading" class="flex items-center gap-2">
                        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        Verifying...
                    </span>
                </button>

                <div class="text-center">
                    <button type="button" (click)="isOtpMode = false"
                        class="text-primary hover:underline text-sm font-medium">
                        Back to Signup
                    </button>
                </div>
            </div>

            <div *ngIf="!isOtpMode" class="mt-6 text-center text-sm">
                <span class="text-slate-600 dark:text-slate-400">
                    {{ isLoginMode ? "Don't have an account?" : "Already have an account?" }}
                </span>
                <button type="button" (click)="toggleMode()"
                    class="ml-1 font-semibold text-primary hover:text-[#c4161b] transition-colors cursor-pointer">
                    {{ isLoginMode ? "Sign Up" : "Sign In" }}
                </button>
            </div>

        </div>
    </div>
</div>
